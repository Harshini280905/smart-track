# ─────────────────────────────────────────────────────────────────────────────
# SmartTrack — GitHub Actions CI/CD Workflow
# Alternative to Jenkinsfile | 4 Stages
# ─────────────────────────────────────────────────────────────────────────────

name: SmartTrack CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: smarttrack-app
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  # ── STAGE 1 & 2: CLONE + BUILD & TEST ──────────────────────────────────────
  build-and-test:
    name: "Stage 1+2: Clone, Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: "Stage 1: Clone Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show repository info
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          ls -la

      - name: "Stage 2: Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 app.py --max-line-length=120 --ignore=E501,W503 || true

      - name: Run unit tests
        run: |
          python -m pytest test_app.py -v --tb=short

  # ── STAGE 3: DOCKER BUILD & PUSH ───────────────────────────────────────────
  docker-build-push:
    name: "Stage 3: Docker Build & Push"
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/smarttrack-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/smarttrack-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print Docker image info
        run: |
          echo "Image pushed: ${{ secrets.DOCKERHUB_USERNAME }}/smarttrack-app:latest"
          echo "Run with: docker run -p 5000:5000 ${{ secrets.DOCKERHUB_USERNAME }}/smarttrack-app:latest"

  # ── STAGE 4: DEPLOY TO AWS EC2 (Nice to Have) ──────────────────────────────
  deploy-to-ec2:
    name: "Stage 4: Deploy to AWS EC2"
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Deploying SmartTrack to EC2 ==="

            # Pull latest image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/smarttrack-app:latest

            # Stop and remove existing container
            docker stop smarttrack-app || true
            docker rm smarttrack-app || true

            # Run new container
            docker run -d \
              --name smarttrack-app \
              -p 5000:5000 \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/smarttrack-app:latest

            echo "=== Deployment complete ==="
            docker ps | grep smarttrack
